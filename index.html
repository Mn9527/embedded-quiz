<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嵌入式系统选择题练习</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; line-height: 1.6; }
.container { max-width: 900px; margin: 0 auto; padding: 20px; }

.header { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: sticky; top: 20px; z-index: 100; }
.header h1 { font-size: 22px; margin-bottom: 12px; color: #1a1a2e; display: flex; align-items: center; gap: 10px; }
.header h1 .header-toggle { font-size: 18px; cursor: pointer; padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px; background: #f8f9fa; line-height: 1; transition: all .15s; flex-shrink: 0; }
.header h1 .header-toggle:hover { background: #e9ecef; }

.header.collapsed { padding: 14px 20px; cursor: pointer; }
.header.collapsed > * { display: none !important; }
.header.collapsed::after { content: '☰ 展开面板'; font-size: 15px; color: #4361ee; font-weight: 600; }

.mode-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.mode-tab { padding: 8px 20px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; background: #fff; color: #666; transition: all .15s; }
.mode-tab:hover { border-color: #4361ee; color: #4361ee; }
.mode-tab.active { border-color: #4361ee; background: #eef1ff; color: #4361ee; }

.header .info { color: #666; font-size: 14px; margin-bottom: 16px; }
.header .info span { margin-right: 20px; }

.btn { display: inline-block; padding: 10px 28px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 600; transition: all .2s; }
.btn-reset { background: #e9ecef; color: #495057; margin-left: 10px; }
.btn-reset:hover { background: #dee2e6; }
.btn-reshuffle { background: #e9ecef; color: #495057; margin-left: 10px; }
.btn-reshuffle:hover { background: #dee2e6; }

.score-bar { padding: 16px; border-radius: 10px; margin-bottom: 16px; font-size: 15px; background: #e9ecef; }
.score-bar .score-text { font-weight: 700; font-size: 20px; color: #333; }
.score-bar .score-detail { color: #666; margin-top: 4px; }

.question { background: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-left: 4px solid transparent; transition: border-color .3s; content-visibility: auto; contain-intrinsic-size: auto 140px; }
.question.correct { border-left-color: #28a745; }
.question.wrong { border-left-color: #dc3545; }
.question .q-title { font-weight: 700; font-size: 15px; margin-bottom: 12px; color: #1a1a2e; }
.question .q-num { color: #4361ee; margin-right: 6px; }
.question .q-result { display: none; font-size: 12px; margin-left: 8px; padding: 2px 8px; border-radius: 4px; }
.question .q-result.show { display: inline; }
.question .q-result.correct-tag { background: #d4edda; color: #155724; }
.question .q-result.wrong-tag { background: #f8d7da; color: #721c24; }
.question .q-actions { display: inline-flex; gap: 4px; vertical-align: middle; }

.options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
.option { display: flex; align-items: center; padding: 10px 14px; border: 2px solid #e9ecef; border-radius: 8px; cursor: pointer; transition: all .15s; }
.option:hover { border-color: #adb5bd; background: #f8f9fa; }
.option input[type=radio] { display: none; }
.option .letter { width: 28px; height: 28px; border-radius: 50%; background: #e9ecef; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; margin-right: 10px; flex-shrink: 0; transition: all .15s; }
.option.selected { border-color: #4361ee; background: #eef1ff; }
.option.selected .letter { background: #4361ee; color: #fff; }
.option.correct-answer { border-color: #28a745; background: #d4edda; }
.option.correct-answer .letter { background: #28a745; color: #fff; }
.option.wrong-answer { border-color: #dc3545; background: #f8d7da; }
.option.wrong-answer .letter { background: #dc3545; color: #fff; }
.option .text { flex: 1; font-size: 14px; }
.option.reveal-correct { border-color: #28a745; background: #d4edda; }
.option.reveal-correct .letter { background: #28a745; color: #fff; }

.btn-bookmark { display: inline-block; padding: 2px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; cursor: pointer; background: #fff; transition: all .15s; user-select: none; line-height: 1; }
.btn-bookmark:hover { border-color: #f0a500; }
.btn-bookmark.marked { border-color: #f0a500; background: #fff8e1; }

.btn-answer { display: inline-block; padding: 2px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; cursor: pointer; color: #666; background: #fff; transition: all .15s; user-select: none; }
.btn-answer:hover { border-color: #4361ee; color: #4361ee; }
.btn-answer.active { border-color: #28a745; color: #28a745; background: #d4edda; }
.answer-reveal { display: none; margin-top: 10px; padding: 8px 12px; background: #d4edda; border-radius: 6px; font-size: 13px; color: #155724; }
.answer-reveal.show { display: block; }

.empty-hint { text-align: center; padding: 60px 20px; color: #999; font-size: 15px; }

.footer { text-align: center; padding: 24px; color: #999; font-size: 13px; }

@media (max-width: 480px) {
  .container { padding: 12px; }
  .header { padding: 16px; top: 10px; border-radius: 10px; }
  .header.collapsed { padding: 10px 14px; }
  .header h1 { font-size: 18px; margin-bottom: 10px; }
  .header h1 .header-toggle { font-size: 16px; padding: 3px 8px; }
  .mode-tabs { gap: 4px; margin-bottom: 10px; }
  .mode-tab { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
  .header .info { font-size: 12px; margin-bottom: 10px; }
  .header .info span { margin-right: 12px; }
  .btn { padding: 10px 16px; font-size: 14px; width: 100%; margin-bottom: 8px; }
  .btn-reset, .btn-reshuffle { margin-left: 0; }

  .question { padding: 14px 16px; margin-bottom: 10px; border-radius: 8px; contain-intrinsic-size: auto 160px; }
  .question .q-title { font-size: 14px; margin-bottom: 8px; line-height: 1.5; }
  .question .q-actions { display: flex; gap: 4px; margin-top: 4px; }
  .btn-bookmark { font-size: 16px; padding: 2px 10px; }
  .btn-answer { font-size: 11px; padding: 3px 10px; }

  .option { padding: 12px 12px; border-radius: 6px; }
  .option .letter { width: 26px; height: 26px; font-size: 12px; margin-right: 8px; }
  .option .text { font-size: 13px; }

  .score-bar { padding: 12px; font-size: 13px; }
  .score-bar .score-text { font-size: 17px; }
  .answer-reveal { font-size: 12px; padding: 6px 10px; }

  .header.collapsed {
    padding: 0;
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center; justify-content: center;
    cursor: pointer;
    top: 12px;
    margin-left: auto;
    margin-bottom: 12px;
  }
  .header.collapsed > * { display: none !important; }
  .header.collapsed::after {
    content: '☰';
    font-size: 22px;
    line-height: 1;
    color: #4361ee;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="header" id="header" onclick="if(this.classList.contains('collapsed'))toggleHeader()">
    <h1>嵌入式系统选择题练习<span class="header-toggle" onclick="toggleHeader();event.stopPropagation()" title="折叠面板">−</span></h1>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-all" onclick="switchMode('all')">全部题库</button>
      <button class="mode-tab" id="tab-exam" onclick="switchMode('exam')">模拟考试（20题）</button>
      <button class="mode-tab" id="tab-bookmark" onclick="switchMode('bookmark')">标记题目（<span id="bookmarkCount">0</span>）</button>
    </div>
    <div class="info">
      <span>共 <strong id="totalCount">0</strong> 题</span>
      <span>已答 <strong id="answeredCount">0</strong> 题</span>
    </div>
    <div class="score-bar" id="scoreBar">
      <div class="score-text" id="scoreText">尚未作答</div>
      <div class="score-detail" id="scoreDetail"></div>
    </div>
    <button class="btn btn-reset" id="btnReset" onclick="resetQuiz()">重新作答</button>
    <button class="btn btn-reshuffle" id="btnReshuffle" style="display:none" onclick="reshuffleExam()">重新出题</button>
  </div>

  <div id="questionsContainer"></div>

  <div class="footer">嵌入式系统选择题在线练习</div>
</div>

<script src="questions.js"></script>
<script>
const container = document.getElementById('questionsContainer');
let currentQuestions = QUESTIONS;
let mode = 'all';
const bookmarks = new Set();
// Track user's answer for each question (by index in currentQuestions): null or 'A'-'D'
let answers = {};

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function toggleHeader() {
  document.getElementById('header').classList.toggle('collapsed');
}

function updateBookmarkCount() {
  document.getElementById('bookmarkCount').textContent = bookmarks.size;
}

function switchMode(newMode) {
  mode = newMode;

  document.getElementById('tab-all').classList.toggle('active', mode === 'all');
  document.getElementById('tab-exam').classList.toggle('active', mode === 'exam');
  document.getElementById('tab-bookmark').classList.toggle('active', mode === 'bookmark');
  document.getElementById('btnReshuffle').style.display = mode === 'exam' ? '' : 'none';

  if (mode === 'exam') {
    currentQuestions = shuffle(QUESTIONS).slice(0, 20);
  } else if (mode === 'bookmark') {
    currentQuestions = QUESTIONS.filter(q => bookmarks.has(q.id));
  } else {
    currentQuestions = QUESTIONS;
  }

  answers = {};
  renderQuestions();
  updateScore();
}

function reshuffleExam() {
  currentQuestions = shuffle(QUESTIONS).slice(0, 20);
  answers = {};
  renderQuestions();
  updateScore();
}

function toggleBookmark(idx, event) {
  event.stopPropagation();
  const q = currentQuestions[idx];
  if (bookmarks.has(q.id)) {
    bookmarks.delete(q.id);
  } else {
    bookmarks.add(q.id);
  }
  updateBookmarkCount();

  const btn = document.getElementById(`bm-${idx}`);
  if (btn) {
    btn.textContent = bookmarks.has(q.id) ? '★' : '☆';
    btn.classList.toggle('marked', bookmarks.has(q.id));
  }

  if (mode === 'bookmark' && !bookmarks.has(q.id)) {
    currentQuestions = QUESTIONS.filter(q => bookmarks.has(q.id));
    answers = {};
    renderQuestions();
    updateScore();
  }
}

function renderQuestions() {
  if (currentQuestions.length === 0) {
    container.innerHTML = '<div class="empty-hint">暂无题目</div>';
  } else {
    container.innerHTML = currentQuestions.map((q, idx) => `
      <div class="question" id="q-${idx}">
        <div class="q-title">
          <span class="q-num">#${idx + 1}</span>${q.question}
          <span class="q-result" id="result-${idx}"></span>
        </div>
        <div class="q-actions">
          <span class="btn-bookmark${bookmarks.has(q.id) ? ' marked' : ''}" id="bm-${idx}" onclick="toggleBookmark(${idx}, event)">${bookmarks.has(q.id) ? '★' : '☆'}</span>
          <span class="btn-answer" id="btn-ans-${idx}" onclick="toggleAnswer(${idx})">查看答案</span>
        </div>
        <div class="options">
          ${['A','B','C','D'].map(letter => `
            <label class="option" id="opt-${idx}-${letter}" onclick="selectOption(${idx}, '${letter}')">
              <input type="radio" name="q-${idx}" value="${letter}">
              <span class="letter">${letter}</span>
              <span class="text">${q.options[letter]}</span>
            </label>
          `).join('')}
        </div>
        <div class="answer-reveal" id="reveal-${idx}">
          正确答案：<strong>${q.answer}</strong> — ${q.options[q.answer]}<br>
          <span style="color:#666;font-size:12px;">${q.explanation || ''}</span>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('totalCount').textContent = currentQuestions.length;
  // Restore previous answers
  Object.keys(answers).forEach(idx => {
    const letter = answers[idx];
    const radio = document.querySelector(`input[name="q-${idx}"][value="${letter}"]`);
    if (radio) radio.checked = true;
    highlightAnswer(parseInt(idx), letter);
  });
  updateAnsweredCount();
}

function highlightAnswer(idx, letter) {
  const q = currentQuestions[idx];
  // Clear
  ['A','B','C','D'].forEach(l => {
    const opt = document.getElementById(`opt-${idx}-${l}`);
    if (opt) {
      opt.classList.remove('selected', 'correct-answer', 'wrong-answer');
    }
  });
  const resultTag = document.getElementById(`result-${idx}`);
  const questionDiv = document.getElementById(`q-${idx}`);
  if (!resultTag || !questionDiv) return;

  questionDiv.classList.remove('correct', 'wrong');

  // Apply selected + correct/wrong
  const selOpt = document.getElementById(`opt-${idx}-${letter}`);
  if (selOpt) selOpt.classList.add('selected');

  if (letter === q.answer) {
    questionDiv.classList.add('correct');
    resultTag.innerHTML = '✓ 正确';
    resultTag.className = 'q-result show correct-tag';
    if (selOpt) selOpt.classList.add('correct-answer');
  } else {
    questionDiv.classList.add('wrong');
    resultTag.innerHTML = '✗ 错误';
    resultTag.className = 'q-result show wrong-tag';
    if (selOpt) selOpt.classList.add('wrong-answer');
    const correctOpt = document.getElementById(`opt-${idx}-${q.answer}`);
    if (correctOpt) correctOpt.classList.add('correct-answer');
  }
}

function selectOption(idx, letter) {
  const q = currentQuestions[idx];

  // Update radio
  const radios = document.getElementsByName(`q-${idx}`);
  radios.forEach(r => { if (r.value === letter) r.checked = true; });

  // Save answer
  answers[idx] = letter;

  // Immediate feedback
  highlightAnswer(idx, letter);
  updateAnsweredCount();
  updateScore();

  // Auto-reveal answer and explanation
  showAnswer(idx);
}

function updateAnsweredCount() {
  const count = Object.keys(answers).length;
  document.getElementById('answeredCount').textContent = count;
}

function updateScore() {
  let correct = 0, wrong = 0;
  Object.keys(answers).forEach(idx => {
    const q = currentQuestions[idx];
    if (q && answers[idx] === q.answer) correct++;
    else if (q) wrong++;
  });

  const answered = correct + wrong;
  if (answered === 0) {
    document.getElementById('scoreText').textContent = '尚未作答';
    document.getElementById('scoreDetail').textContent = '';
    return;
  }

  const percent = Math.round(correct / answered * 100);
  const bar = document.getElementById('scoreBar');
  bar.style.background = percent >= 80 ? '#d4edda' : percent >= 60 ? '#fff3cd' : '#f8d7da';
  bar.style.border = '1px solid ' + (percent >= 80 ? '#c3e6cb' : percent >= 60 ? '#ffeeba' : '#f5c6cb');
  document.getElementById('scoreText').textContent =
    `正确率：${percent}%（${correct} / ${answered}）`;
  document.getElementById('scoreDetail').textContent =
    `正确 ${correct} 题 | 错误 ${wrong} 题 | 未作答 ${currentQuestions.length - answered} 题`;
}

function showAnswer(idx) {
  const q = currentQuestions[idx];
  const reveal = document.getElementById(`reveal-${idx}`);
  const btn = document.getElementById(`btn-ans-${idx}`);
  const opt = document.getElementById(`opt-${idx}-${q.answer}`);
  if (!reveal || reveal.classList.contains('show')) return;
  reveal.classList.add('show');
  btn.classList.add('active');
  btn.textContent = '隐藏答案';
  opt.classList.add('reveal-correct');
}

function toggleAnswer(idx) {
  const q = currentQuestions[idx];
  const reveal = document.getElementById(`reveal-${idx}`);
  const btn = document.getElementById(`btn-ans-${idx}`);
  const opt = document.getElementById(`opt-${idx}-${q.answer}`);
  const isShowing = reveal.classList.contains('show');

  if (isShowing) {
    reveal.classList.remove('show');
    btn.classList.remove('active');
    btn.textContent = '查看答案';
    opt.classList.remove('reveal-correct');
  } else {
    reveal.classList.add('show');
    btn.classList.add('active');
    btn.textContent = '隐藏答案';
    opt.classList.add('reveal-correct');
  }
}

function resetQuiz() {
  answers = {};
  document.querySelectorAll('input[type=radio]').forEach(r => r.checked = false);
  document.querySelectorAll('.question').forEach(q => {
    q.classList.remove('correct', 'wrong');
  });
  document.querySelectorAll('.option').forEach(o => {
    o.classList.remove('selected', 'correct-answer', 'wrong-answer', 'reveal-correct');
  });
  document.querySelectorAll('.q-result').forEach(r => {
    r.className = 'q-result';
  });
  document.querySelectorAll('.answer-reveal').forEach(r => {
    r.classList.remove('show');
  });
  document.querySelectorAll('.btn-answer').forEach(b => {
    b.classList.remove('active');
    b.textContent = '查看答案';
  });
  updateScore();
  updateAnsweredCount();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderQuestions();
</script>
</body>
</html>
